worker_processes 1;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    tcp_nopush     on;

    keepalive_timeout  120;

    server {
        location / {
            return 403;
        }
    }

    server {
        resolver 127.0.0.1 valid=30s;
        server_name my-custom-host;

        client_header_buffer_size 64k;
        large_client_header_buffers 4 64k;
        client_body_buffer_size 128k;

        client_max_body_size 5000M; # subindo limite do upload para 5GB

        location /api/public/ {
            proxy_set_header Host      'smae';
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass       http://smae_api:3001/public/;
        }

        location /api/ {
            proxy_set_header Host      'smae';
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass       http://smae_api:3001;
        }

        location /api-json {
            proxy_set_header Host      'smae';
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass       http://smae_api:3001;
        }

        location /metadb/ {
            # Metabase é embutido em iframe pela própria SMAE (mesmo domínio),
            # então precisa de SAMEORIGIN e não DENY. proxy_hide_header evita
            # header duplicado caso o Metabase emita o seu próprio.
            proxy_hide_header X-Frame-Options;
            add_header X-Frame-Options "SAMEORIGIN" always;

            proxy_set_header Host      'smae';
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_pass       http://metabase:3000/;
        }

        location / {
            # Anti-clickjacking (5.5): ninguém pode embutir a SMAE em iframe.
            # Não afeta os iframes que a própria SMAE carrega (Metabase/Power BI).
            add_header X-Frame-Options "DENY" always;

            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
